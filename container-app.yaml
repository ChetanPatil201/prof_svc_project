apiVersion: 2023-05-01
location: westus
name: prof-svc-app
properties:
  managedEnvironmentId: /subscriptions/{subscription-id}/resourceGroups/prof-svc-rg/providers/Microsoft.App/managedEnvironments/prof-svc-env
  configuration:
    ingress:
      external: true
      targetPort: 3000
      allowInsecure: false
    secrets:
      - name: azure-openai-key
        value: your-azure-openai-key-here
    registries:
      - server: profsvcregistry.azurecr.io
        username: profsvcregistry
        passwordSecretRef: acr-password
  template:
    containers:
      - name: prof-svc-app
        image: profsvcregistry.azurecr.io/prof-svc-app:latest
        env:
          - name: NODE_ENV
            value: production
          - name: PORT
            value: "3000"
          - name: HOSTNAME
            value: "0.0.0.0"
          - name: AZURE_OPENAI_ENDPOINT
            value: "https://your-resource.openai.azure.com/"
          - name: AZURE_OPENAI_KEY
            secretRef: azure-openai-key
          - name: AZURE_OPENAI_DEPLOYMENT
            value: "gpt-4o"
        resources:
          cpu: 1.0
          memory: 2.0Gi
    scale:
      minReplicas: 1
      maxReplicas: 10
